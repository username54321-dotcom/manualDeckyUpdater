name: Release
on:
  push:
    tags: "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/deckyUpdater.exe
